<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="313 Days - A personal diary, recording every moment of this epic journey.">
<meta property="og:title" content="313 Days">
<meta property="og:description" content="A personal diary, recording every moment of this epic journey.">
<meta property="og:type" content="website">
<title>313 Days</title>
<style>
/* ===== Reset & Base ===== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #2c1810;
  --page: #f5e6c8;
  --page-dark: #e8d5a8;
  --ink: #3b2314;
  --ink-light: #6b4c3b;
  --accent: #8b4513;
  --gold: #c9a84c;
  --shadow: rgba(0,0,0,.45);
}

@font-face {
  font-family 'DiaryFont';
  src: local('STKaiti'), local('KaiTi'), local('楷体'), local('SimSun'), local('宋体');
}

html { font-size: 16px; }

body {
  font-family: 'DiaryFont', 'Georgia', serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  overflow-x: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ===== Background Particles ===== */
#particles {
  position: fixed; inset: 0;
  pointer-events: none; z-index: 0;
  overflow: hidden;
}
.particle {
  position: absolute;
  width: 4px; height: 4px;
  background: var(--gold);
  border-radius: 50%;
  opacity: 0;
  animation: floatUp linear infinite;
}
@keyframes floatUp {
  0%   { opacity: 0; transform: translateY(100vh) scale(0); }
  10%  { opacity: .6; }
  90%  { opacity: .3; }
  100% { opacity: 0; transform: translateY(-10vh) scale(1); }
}

/* ===== App Container ===== */
#app {
  position: relative; z-index: 1;
  width: 100%; max-width: 900px;
  min-height: 100vh;
  display: flex; flex-direction: column;
}

/* ===== Header ===== */
header {
  text-align: center;
  padding: 40px 20px 20px;
  animation: fadeSlideDown .8s ease-out both;
}
@keyframes fadeSlideDown {
  from { opacity: 0; transform: translateY(-30px); }
  to   { opacity: 1; transform: translateY(0); }
}
header h1 {
  font-size: 2.4rem;
  color: var(--gold);
  text-shadow: 0 2px 12px rgba(201,168,76,.35), 0 1px 0 rgba(255,255,255,.15);
  letter-spacing: .3em;
  font-weight: 400;
}
header p {
  color: var(--ink-light);
  margin-top: 6px;
  font-size: .85rem;
  letter-spacing: .15em;
}

/* ===== Book Toggle (file selector) ===== */
#book-toggle {
  display: flex; justify-content: center; gap: 10px;
  padding: 10px 20px;
  flex-wrap: wrap;
  animation: fadeIn 1s .3s ease-out both;
}
@keyframes fadeIn {
  from { opacity: 0; }
  to   { opacity: 1; }
}
#book-toggle .btn {
  background: linear-gradient(135deg, var(--page), var(--page-dark));
  border: 1px solid var(--accent);
  color: var(--ink);
  padding: 8px 18px;
  border-radius: 6px;
  font-family: inherit;
  font-size: .85rem;
  cursor: pointer;
  transition: all .3s ease;
  position: relative;
  overflow: hidden;
}
#book-toggle .btn::after {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(circle at var(--x,50%) var(--y,50%), rgba(255,255,255,.35), transparent 60%);
  opacity: 0;
  transition: opacity .3s;
}
#book-toggle .btn:hover::after { opacity: 1; }
#book-toggle .btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 20px var(--shadow);
}
#book-toggle .btn.active {
  background: linear-gradient(135deg, var(--accent), #6b3410);
  color: #fff;
  border-color: var(--gold);
}

/* ===== Diary Book ===== */
#book {
  flex: 1;
  margin: 20px auto;
  perspective: 1800px;
  display: none;
  animation: bookAppear .9s ease-out both;
}
#book.visible { display: block; }
@keyframes bookAppear {
  from { opacity: 0; transform: rotateY(-12deg) scale(.92); }
  to   { opacity: 1; transform: rotateY(0) scale(1); }
}

/* ===== Page ===== */
#page-wrapper {
  --line-h: calc(1.05rem * 2); /* matches line-height: 2 on 1.05rem */
  background:
    repeating-linear-gradient(
      0deg,
      transparent,
      transparent calc(var(--line-h) - 1px),
      rgba(139,69,19,.08) calc(var(--line-h) - 1px),
      rgba(139,69,19,.08) var(--line-h)
    ),
    linear-gradient(135deg, #f7ebd0, #f0dbb8, #e8d0a0);
  border: 2px solid #c9a05a;
  border-radius: 4px 12px 12px 4px;
  box-shadow:
    -6px 0 18px rgba(0,0,0,.25),
    6px 0 18px rgba(0,0,0,.25),
    inset 0 0 60px rgba(139,69,19,.12),
    0 12px 40px rgba(0,0,0,.4);
  padding: 36px 48px;
  min-height: 520px;
  max-height: 70vh;
  overflow-y: auto;
  position: relative;
  transition: transform .5s ease;
  scroll-behavior: smooth;
}
#page-wrapper::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 36px;
  background: linear-gradient(90deg, rgba(0,0,0,.08), transparent);
  border-right: 1px solid rgba(139,69,19,.15);
  pointer-events: none;
}
#page-wrapper::after {
  content: '';
  position: absolute;
  right: 8px; top: 12px;
  font-size: .7rem;
  color: var(--ink-light);
  opacity: .45;
  font-style: italic;
  pointer-events: none;
}

/* Page content */
#page-content {
  line-height: 2;
  font-size: 1.05rem;
  text-indent: 2em;
  white-space: pre-wrap;
  word-wrap: break-word;
  position: relative;
  z-index: 1;
}
#page-content p {
  margin-bottom: 0;
  text-indent: 2em;
  line-height: 2;
}
#page-content .date-header {
  font-size: 1.3rem;
  text-align: center;
  color: var(--accent);
  font-weight: 400;
  letter-spacing: .25em;
  margin: 0 0 20px 0;
  padding: 0 0 12px 0;
  border-bottom: 1px solid rgba(139,69,19,.2);
  text-indent: 0;
  font-family: 'DiaryFont', 'Georgia', serif;
}

/* Page number */
#page-number {
  position: absolute;
  bottom: 14px; right: 30px;
  font-size: .75rem;
  color: var(--ink-light);
  opacity: .5;
}

/* ===== Page Flip Animation ===== */
#page-wrapper.flip-next {
  animation: flipNext .6s ease-in-out;
}
#page-wrapper.flip-prev {
  animation: flipPrev .6s ease-in-out;
}
@keyframes flipNext {
  0%   { transform: rotateY(0); opacity: 1; }
  50%  { transform: rotateY(-8deg) scale(.97); opacity: .4; }
  100% { transform: rotateY(0); opacity: 1; }
}
@keyframes flipPrev {
  0%   { transform: rotateY(0); opacity: 1; }
  50%  { transform: rotateY(8deg) scale(.97); opacity: .4; }
  100% { transform: rotateY(0); opacity: 1; }
}

/* ===== Navigation ===== */
#nav {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 24px;
  padding: 24px 20px 40px;
  animation: fadeIn 1s .5s ease-out both;
}
#nav .nav-btn {
  width: 48px; height: 48px;
  border-radius: 50%;
  border: 2px solid var(--gold);
  background: linear-gradient(135deg, rgba(201,168,76,.15), rgba(139,69,19,.1));
  color: var(--gold);
  font-size: 1.2rem;
  cursor: pointer;
  transition: all .35s ease;
  display: flex; align-items: center; justify-content: center;
  font-family: inherit;
}
#nav .nav-btn:hover:not(:disabled) {
  background: var(--gold);
  color: var(--bg);
  transform: scale(1.1);
  box-shadow: 0 0 20px rgba(201,168,76,.45);
}
#nav .nav-btn:disabled {
  opacity: .3;
  cursor: not-allowed;
}
#nav .page-info {
  color: var(--gold);
  font-size: .9rem;
  min-width: 100px;
  text-align: center;
}

/* ===== Loading ===== */
#loading {
  display: none;
  text-align: center;
  padding: 60px 20px;
  color: var(--gold);
}
#loading.visible { display: block; }
.spinner {
  width: 40px; height: 40px;
  margin: 0 auto 16px;
  border: 3px solid rgba(201,168,76,.2);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ===== Empty State ===== */
#empty {
  display: none;
  text-align: center;
  padding: 80px 20px;
  color: var(--ink-light);
  animation: fadeIn 1s ease-out both;
}
#empty.visible { display: block; }
#empty .icon { font-size: 3rem; margin-bottom: 16px; opacity: .5; }
#empty p { font-size: .95rem; line-height: 1.8; }

/* ===== Scrollbar ===== */
#page-wrapper::-webkit-scrollbar { width: 8px; }
#page-wrapper::-webkit-scrollbar-track { background: rgba(139,69,19,.06); border-radius: 4px; }
#page-wrapper::-webkit-scrollbar-thumb {
  background: var(--accent);
  border-radius: 4px;
  opacity: .5;
}
#page-wrapper::-webkit-scrollbar-thumb:hover { opacity: .8; }

/* ===== Decorative Ink Splatter ===== */
.ink-splat {
  position: fixed;
  width: 200px; height: 200px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(139,69,19,.06), transparent 70%);
  pointer-events: none;
  z-index: 0;
  animation: pulse 4s ease-in-out infinite alternate;
}
.ink-splat.top-left  { top: -60px; left: -60px; }
.ink-splat.bottom-right { bottom: -60px; right: -60px; animation-delay: 2s; }
@keyframes pulse {
  from { transform: scale(1); opacity: .5; }
  to   { transform: scale(1.3); opacity: .8; }
}

/* ===== Word Count / Progress ===== */
#progress-bar {
  position: fixed;
  top: 0; left: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--gold), var(--accent));
  z-index: 100;
  transition: width .3s ease;
  box-shadow: 0 0 10px var(--gold);
}

/* ===== Timeline Search ===== */
#timeline-search {
  padding: 12px 16px;
  border-bottom: 1px solid rgba(201,168,76,.15);
  flex-shrink: 0;
}
#timeline-search input {
  width: 100%;
  background: rgba(245,230,200,.08);
  border: 1px solid rgba(201,168,76,.3);
  border-radius: 20px;
  padding: 8px 36px 8px 16px;
  font-family: inherit;
  font-size: .85rem;
  color: var(--page);
  outline: none;
  transition: all .3s ease;
}
#timeline-search input::placeholder {
  color: rgba(245,230,200,.3);
}
#timeline-search input:focus {
  border-color: var(--gold);
  background: rgba(245,230,200,.12);
  box-shadow: 0 0 12px rgba(201,168,76,.2);
}
#timeline-search .clear-btn {
  position: absolute;
  right: 24px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: var(--gold);
  font-size: 1rem;
  cursor: pointer;
  opacity: 0;
  transition: opacity .2s;
  pointer-events: none;
  line-height: 1;
}
#timeline-search .clear-btn.visible {
  opacity: .6;
  pointer-events: auto;
}
#timeline-search .clear-btn:hover {
  opacity: 1;
}
#timeline-search {
  position: relative;
}

/* No results */
.timeline-no-results {
  text-align: center;
  padding: 40px 20px;
  color: rgba(245,230,200,.3);
  font-size: .85rem;
}

/* ===== Timeline Toggle Button ===== */
#timeline-toggle {
  position: fixed;
  right: 20px;
  top: 50%;
  transform: translateY(-50%);
  width: 40px; height: 40px;
  border-radius: 50%;
  border: 2px solid var(--gold);
  background: linear-gradient(135deg, rgba(44,24,16,.9), rgba(44,24,16,.7));
  color: var(--gold);
  font-size: 1.1rem;
  cursor: pointer;
  z-index: 150;
  transition: all .35s ease;
  display: none;
  align-items: center; justify-content: center;
  font-family: inherit;
  box-shadow: 0 4px 20px rgba(0,0,0,.4);
}
#timeline-toggle.visible { display: flex; }
#timeline-toggle:hover {
  background: var(--gold);
  color: var(--bg);
  transform: translateY(-50%) scale(1.1);
  box-shadow: 0 0 24px rgba(201,168,76,.5);
}

/* ===== Timeline Overlay ===== */
#timeline-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,.5);
  z-index: 160;
  opacity: 0;
  pointer-events: none;
  transition: opacity .35s ease;
}
#timeline-overlay.visible {
  opacity: 1;
  pointer-events: auto;
}

/* ===== Timeline Panel ===== */
#timeline-panel {
  position: fixed;
  right: 0; top: 0; bottom: 0;
  width: 300px;
  max-width: 85vw;
  background: linear-gradient(180deg, #1e1208, #2c1810, #1e1208);
  border-left: 2px solid rgba(201,168,76,.3);
  z-index: 170;
  transform: translateX(100%);
  transition: transform .4s cubic-bezier(.4,0,.2,1);
  display: flex; flex-direction: column;
  box-shadow: -8px 0 40px rgba(0,0,0,.5);
}
#timeline-panel.visible {
  transform: translateX(0);
}

#timeline-header {
  position: relative;
  padding: 24px 20px 16px;
  text-align: center;
  border-bottom: 1px solid rgba(201,168,76,.2);
  flex-shrink: 0;
}
#timeline-header h2 {
  color: var(--gold);
  font-size: 1.2rem;
  font-weight: 400;
  letter-spacing: .3em;
}
#timeline-header .close-btn {
  position: absolute;
  top: 16px; right: 16px;
  background: none; border: none;
  color: var(--gold);
  font-size: 1.4rem;
  cursor: pointer;
  opacity: .6;
  transition: opacity .3s;
  line-height: 1;
}
#timeline-header .close-btn:hover { opacity: 1; }

/* Timeline body */
#timeline-body {
  flex: 1;
  overflow-y: auto;
  padding: 12px 0;
}
#timeline-body::-webkit-scrollbar { width: 4px; }
#timeline-body::-webkit-scrollbar-track { background: transparent; }
#timeline-body::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 2px; opacity: .3; }

.timeline-month {
  position: relative;
  padding: 0 20px;
}
.timeline-month-title {
  color: var(--gold);
  font-size: .8rem;
  letter-spacing: .2em;
  padding: 12px 0 6px;
  opacity: .7;
  position: sticky;
  top: 0;
  background: linear-gradient(180deg, #1e1208 80%, transparent);
  z-index: 1;
}

/* Timeline vertical line */
.timeline-month::before {
  content: '';
  position: absolute;
  left: 38px; top: 0; bottom: 0;
  width: 2px;
  background: linear-gradient(180deg, transparent, rgba(201,168,76,.25), rgba(201,168,76,.25), transparent);
}

.timeline-item {
  position: relative;
  padding: 8px 0 8px 24px;
  cursor: pointer;
  transition: all .25s ease;
  border-radius: 4px;
  margin-left: -6px;
  padding-left: 30px;
}
.timeline-item::before {
  content: '';
  position: absolute;
  left: 32px;
  top: 50%;
  transform: translateY(-50%);
  width: 8px; height: 8px;
  border-radius: 50%;
  border: 2px solid var(--gold);
  background: transparent;
  transition: all .3s ease;
}
.timeline-item:hover {
  background: rgba(201,168,76,.08);
}
.timeline-item:hover::before {
  background: var(--gold);
  box-shadow: 0 0 8px rgba(201,168,76,.5);
}
.timeline-item.active::before {
  background: var(--gold);
  width: 10px; height: 10px;
  left: 31px;
  box-shadow: 0 0 12px rgba(201,168,76,.6);
}
.timeline-item .tl-date {
  color: var(--page);
  font-size: .9rem;
  display: block;
}
.timeline-item .tl-preview {
  color: var(--ink-light);
  font-size: .72rem;
  margin-top: 2px;
  display: block;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  opacity: .5;
}
.timeline-item.active .tl-date {
  color: var(--gold);
}

/* Timeline footer */
#timeline-footer {
  padding: 12px 20px;
  border-top: 1px solid rgba(201,168,76,.15);
  text-align: center;
  flex-shrink: 0;
}
#timeline-footer span {
  color: var(--ink-light);
  font-size: .75rem;
  opacity: .5;
}

/* ===== Responsive ===== */
@media (max-width: 640px) {
  header h1 { font-size: 1.6rem; }
  #page-wrapper {
    padding: 24px 20px;
    min-height: 400px;
    max-height: 60vh;
  }
  #page-wrapper::before { width: 18px; }
  #page-content { font-size: .95rem; }
  #book-toggle .btn { font-size: .75rem; padding: 6px 12px; }
  #timeline-panel { width: 260px; }
  #timeline-toggle { right: 12px; width: 36px; height: 36px; font-size: .95rem; }
}

/* ===== Keyboard hint ===== */
.keyboard-hint {
  position: fixed;
  bottom: 16px; left: 50%;
  transform: translateX(-50%);
  color: rgba(201,168,76,.3);
  font-size: .7rem;
  letter-spacing: .1em;
  pointer-events: none;
}

/* ===== Toast ===== */
.toast {
  position: fixed;
  top: 20px; left: 50%;
  transform: translateX(-50%) translateY(-20px);
  background: var(--page);
  color: var(--ink);
  padding: 10px 24px;
  border-radius: 8px;
  border: 1px solid var(--gold);
  font-family: inherit;
  font-size: .85rem;
  box-shadow: 0 8px 30px var(--shadow);
  opacity: 0;
  transition: all .4s ease;
  z-index: 200;
  pointer-events: none;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}

/* ===== Bookmark ===== */
#bookmark-btn {
  position: absolute;
  top: 12px; right: 12px;
  background: none;
  border: none;
  font-size: 1.3rem;
  cursor: pointer;
  opacity: .35;
  transition: all .3s ease;
  z-index: 10;
}
#bookmark-btn:hover { opacity: 1; transform: scale(1.2); }
#bookmark-btn.active { opacity: 1; }

.search-match {
  background: rgba(201,168,76,.35);
  border-radius: 2px;
  padding: 0 2px;
  transition: background .3s ease;
}

/* ===== Splash / Intro Screen ===== */
#splash {
  position: fixed; inset: 0;
  z-index: 9999;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: #0a0604;
  transition: opacity 1s ease, visibility 1s ease;
  cursor: pointer;
  user-select: none;
}
#splash.hidden {
  opacity: 0;
  visibility: hidden;
  pointer-events: none;
}
#splash .splash-ring {
  position: absolute;
  width: 320px; height: 320px;
  border: 1px solid rgba(201,168,76,.12);
  border-radius: 50%;
  animation: ringPulse 4s ease-in-out infinite;
}
#splash .splash-ring:nth-child(2) {
  width: 420px; height: 420px;
  animation-delay: 1s;
  border-color: rgba(201,168,76,.08);
}
#splash .splash-ring:nth-child(3) {
  width: 520px; height: 520px;
  animation-delay: 2s;
  border-color: rgba(201,168,76,.05);
}
@keyframes ringPulse {
  0%, 100% { transform: scale(.95); opacity: .4; }
  50% { transform: scale(1.05); opacity: 1; }
}
#splash .splash-icon {
  font-size: 2.8rem;
  animation: iconFloat 3s ease-in-out infinite;
  filter: drop-shadow(0 0 20px rgba(201,168,76,.4));
  margin-bottom: 28px;
}
@keyframes iconFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}
#splash .splash-title {
  font-size: 3rem;
  color: var(--gold);
  letter-spacing: .4em;
  font-weight: 400;
  text-shadow: 0 0 40px rgba(201,168,76,.3);
  opacity: 0;
  animation: splashFadeUp 1.2s .5s ease-out forwards;
  font-family: 'DiaryFont', 'Georgia', serif;
}
#splash .splash-sub {
  font-size: .9rem;
  color: var(--ink-light);
  letter-spacing: .3em;
  margin-top: 10px;
  opacity: 0;
  animation: splashFadeUp 1.2s .9s ease-out forwards;
}
#splash .splash-hint {
  position: absolute;
  bottom: 40px;
  color: rgba(201,168,76,.25);
  font-size: .75rem;
  letter-spacing: .2em;
  opacity: 0;
  animation: splashFadeUp 1s 2.5s ease-out forwards, hintBlink 2s 3.5s ease-in-out infinite;
}
@keyframes hintBlink {
  0%, 100% { opacity: .25; }
  50% { opacity: .6; }
}
@keyframes splashFadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to   { opacity: 1; transform: translateY(0); }
}
#splash .splash-line {
  width: 60px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  margin: 20px auto;
  opacity: 0;
  animation: splashFadeUp 1s 1.3s ease-out forwards;
}

@media (max-width: 640px) {
  #splash .splash-title { font-size: 2rem; }
  #splash .splash-ring { width: 220px; height: 220px; }
  #splash .splash-ring:nth-child(2) { width: 300px; height: 300px; }
  #splash .splash-ring:nth-child(3) { width: 380px; height: 380px; }
}
</style>
</head>
<body>

<!-- Splash / Intro Screen -->
<div id="splash">
  <div class="splash-ring"></div>
  <div class="splash-ring"></div>
  <div class="splash-ring"></div>
  <div class="splash-icon">📖</div>
  <div class="splash-title">313 Days</div>
  <div class="splash-line"></div>
  <div class="splash-sub">RECORD THIS EPIC</div>
  <div class="splash-hint">点击任意处打开日记</div>
</div>

<!-- Background effects -->
<div id="particles"></div>
<div class="ink-splat top-left"></div>
<div class="ink-splat bottom-right"></div>
<div id="progress-bar" style="width:0%"></div>

<div id="app">
  <header>
    <h1>313 Days</h1>
    <p>Record This Epic</p>
  </header>

  <!-- Loading -->
  <div id="loading">
    <div class="spinner"></div>
    <p>正在翻阅日记…</p>
  </div>

  <!-- Empty state -->
  <div id="empty">
    <div class="icon">📝</div>
    <p>还没有日记内容<br><small>在目录下放置 .txt 文件即可自动加载</small></p>
  </div>

  <!-- Book -->
  <div id="book">
    <div id="page-wrapper">
      <button id="bookmark-btn" title="收藏本页">☆</button>
      <div id="page-content"></div>
      <div id="page-number"></div>
    </div>
  </div>

  <!-- Navigation -->
  <div id="nav">
    <button class="nav-btn" id="btn-prev" disabled title="上一页">◂</button>
    <span class="page-info" id="page-info"></span>
    <button class="nav-btn" id="btn-next" disabled title="下一页">▸</button>
  </div>
</div>

<div class="keyboard-hint">← → 翻页 &nbsp;|&nbsp; T 时间轴 &nbsp;|&nbsp; / 搜索</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Timeline Toggle -->
<button id="timeline-toggle" title="时间轴">☰</button>

<!-- Timeline Overlay -->
<div id="timeline-overlay"></div>

<!-- Timeline Panel -->
<div id="timeline-panel">
  <div id="timeline-header">
    <h2>Time</h2>
    <button class="close-btn" id="timeline-close">×</button>
  </div>
  <div id="timeline-search">
    <input type="text" id="timeline-search-input" placeholder="搜索日期或内容…" autocomplete="off">
    <button class="clear-btn" id="timeline-search-clear">×</button>
  </div>
  <div id="timeline-body"></div>
  <div id="timeline-footer">
    <span id="timeline-count"></span>
  </div>
</div>

<script>
(function() {
  'use strict';

  // ===== Config =====
  const API_BASE = ''; // relative
  const DIARY_FILE = 'Legendary Time.txt'; // diary file in same directory

  // ===== State =====
  let currentContent = '';
  let currentTitle = '';
  let chunks = [];
  let dates = [];
  let currentPage = 0;
  let bookmarks = JSON.parse(localStorage.getItem('diary_bookmarks') || '{}');

  // ===== DOM =====
  const $ = id => document.getElementById(id);
  const book          = $('book');
  const pageWrapper   = $('page-wrapper');
  const pageContent   = $('page-content');
  const pageNumber    = $('page-number');
  const pageInfo      = $('page-info');
  const btnPrev       = $('btn-prev');
  const btnNext       = $('btn-next');
  const loading       = $('loading');
  const empty         = $('empty');
  const progressBar   = $('progress-bar');
  const bookmarkBtn   = $('bookmark-btn');
  const toastEl       = $('toast');
  const timelineToggle      = $('timeline-toggle');
  const timelinePanel       = $('timeline-panel');
  const timelineOverlay     = $('timeline-overlay');
  const timelineClose       = $('timeline-close');
  const timelineBody        = $('timeline-body');
  const timelineCount       = $('timeline-count');
  const timelineSearchInput = $('timeline-search-input');
  const timelineSearchClear = $('timeline-search-clear');
  const splash            = $('splash');

  // ===== Splash =====
  let diaryStarted = false;

  // Create splash-specific particles
  (function createSplashParticles() {
    for (let i = 0; i < 16; i++) {
      const p = document.createElement('div');
      p.style.cssText = `
        position: absolute;
        width: ${2 + Math.random() * 3}px;
        height: ${2 + Math.random() * 3}px;
        background: rgba(201,168,76,${.15 + Math.random() * .3});
        border-radius: 50%;
        left: ${Math.random() * 100}%;
        top: ${Math.random() * 100}%;
        animation: splashParticle ${4 + Math.random() * 6}s ${Math.random() * 4}s ease-in-out infinite alternate;
        pointer-events: none;
      `;
      splash.appendChild(p);
    }
    // Inject keyframes once
    const style = document.createElement('style');
    style.textContent = `@keyframes splashParticle {
      0% { opacity: 0; transform: translateY(0) scale(.5); }
      50% { opacity: .8; }
      100% { opacity: 0; transform: translateY(-60px) scale(1); }
    }`;
    document.head.appendChild(style);
  })();

  function startDiary() {
    if (diaryStarted) return;
    diaryStarted = true;
    splash.classList.add('hidden');
    // Start loading diary after splash fades
    setTimeout(() => { loadDiary(); createParticles(); }, 600);
  }
  splash.addEventListener('click', startDiary);
  splash.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); startDiary(); }
  });
  // Make splash focusable for keyboard
  splash.setAttribute('tabindex', '0');
  splash.focus();

  // Auto-start after 8 seconds if not interacted
  setTimeout(() => { if (!diaryStarted) startDiary(); }, 8000);
    const container = $('particles');
    for (let i = 0; i < 24; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = Math.random() * 100 + '%';
      p.style.width = p.style.height = (2 + Math.random() * 4) + 'px';
      p.style.animationDuration = (8 + Math.random() * 14) + 's';
      p.style.animationDelay = (Math.random() * 10) + 's';
      container.appendChild(p);
    }
  }

  // ===== Toast =====
  function toast(msg, dur) {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    setTimeout(() => toastEl.classList.remove('show'), dur || 2000);
  }

  // ===== Load diary =====
  async function loadDiary() {
    loading.classList.add('visible');
    try {
      const res = await fetch(DIARY_FILE + '?t=' + Date.now());
      if (!res.ok) throw new Error('404');
      currentContent = await res.text();
      currentTitle = '我的日记';
      chunkContent();
      currentPage = 0;
      renderPage();
      renderTimeline();
      loading.classList.remove('visible');
      book.classList.add('visible');
      updateNav();
      updateBookmark();
    } catch(e) {
      loading.classList.remove('visible');
      empty.classList.add('visible');
      empty.innerHTML = '<div class="icon">📝</div><p>找不到日记文件<br><small>请在同目录下放置 <b>Legendary Time.txt</b></small></p>';
    }
  }

  // ===== Chunk content =====
  function chunkContent() {
    chunks = [];
    dates = [];
    if (!currentContent || !currentContent.trim()) {
      chunks = ['（空白日记）'];
      dates = ['无日期'];
      return;
    }

    // Split by date patterns like "7月31日" or "12月25日" at the start of a line
    const datePattern = /(?:\n)(\d{1,2}月\d{1,2}日)/g;
    let lastIndex = 0;
    let match;

    while ((match = datePattern.exec(currentContent)) !== null) {
      let entry = currentContent.substring(lastIndex, match.index).trim();
      if (entry) {
        chunks.push(entry);
        // Extract date from the beginning of this entry
        dates.push(extractDate(entry) || '无日期');
      }
      lastIndex = match.index + 1;
    }
    // Last entry
    let lastEntry = currentContent.substring(lastIndex).trim();
    if (lastEntry) {
      chunks.push(lastEntry);
      dates.push(extractDate(lastEntry) || '无日期');
    }

    chunks = chunks.filter(c => c.length > 0);
    dates = dates.slice(0, chunks.length);
    if (!chunks.length) { chunks = ['（空白日记）']; dates = ['无日期']; }
  }

  // Extract date from entry text
  function extractDate(text) {
    const lines = text.split('\n');
    for (const line of lines) {
      const m = line.trim().match(/^(\d{1,2}月\d{1,2}日)/);
      if (m) return m[1];
    }
    return null;
  }

  function escapeHtml(str) {
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  // ===== Render current page =====
  function renderPage() {
    const text = chunks[currentPage] || '';
    let html = '';

    // Split by paragraphs
    const paragraphs = text.split('\n');
    paragraphs.forEach(p => {
      if (p.trim()) {
        let escaped = p.trim()
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');
        // Detect date headers like "7月31日" and render them as headings
        if (/^\d{1,2}月\d{1,2}日$/.test(p.trim())) {
          html += '<h3 class="date-header">' + escaped + '</h3>';
        } else {
          html += '<p>' + escaped + '</p>';
        }
      } else {
        html += '<p style="height:1.5em"></p>';
      }
    });

    pageContent.innerHTML = html;
    pageNumber.textContent = `— ${currentPage + 1} / ${chunks.length} —`;
    pageInfo.textContent = `${currentPage + 1} / ${chunks.length}`;

    // Progress bar
    const pct = ((currentPage + 1) / chunks.length * 100).toFixed(1);
    progressBar.style.width = pct + '%';

    // Scroll to top
    pageWrapper.scrollTop = 0;

    // Update bookmark button
    updateBookmark();
  }

  // ===== Timeline =====
  let timelineSearchText = '';

  function renderTimeline() {
    timelineBody.innerHTML = '';
    const grouped = {};

    dates.forEach((date, idx) => {
      // Filter by search
      if (timelineSearchText) {
        const content = chunks[idx] || '';
        if (!content.includes(timelineSearchText) && !date.includes(timelineSearchText)) {
          return;
        }
      }

      // Parse "X月Y日" → month key
      const m = date.match(/(\d{1,2})月/);
      const monthKey = m ? m[1] + '月' : '其他';
      if (!grouped[monthKey]) grouped[monthKey] = [];
      grouped[monthKey].push({ date, idx });
    });

    // Sort months numerically
    const sortedMonths = Object.keys(grouped).sort((a, b) => {
      return parseInt(a) - parseInt(b);
    });

    // Check if there are results
    const totalResults = sortedMonths.reduce((sum, k) => sum + grouped[k].length, 0);
    if (!totalResults) {
      timelineBody.innerHTML = '<div class="timeline-no-results">没有找到匹配的日记</div>';
      timelineCount.textContent = '0 条结果';
      return;
    }

    sortedMonths.forEach(month => {
      const monthDiv = document.createElement('div');
      monthDiv.className = 'timeline-month';
      monthDiv.innerHTML = '<div class="timeline-month-title">' + month + '</div>';

      grouped[month].forEach(item => {
        const el = document.createElement('div');
        el.className = 'timeline-item' + (item.idx === currentPage ? ' active' : '');
        // Preview: first line of content (no date)
        const lines = chunks[item.idx].split('\n');
        const preview = (lines.length > 1 ? lines[1] : lines[0]).trim().substring(0, 30);
        el.innerHTML = '<span class="tl-date">' + item.date + '</span><span class="tl-preview">' + escapeHtml(preview) + '</span>';
        el.addEventListener('click', () => {
          currentPage = item.idx;
          flip('next');
          renderPage();
          updateNav();
          renderTimeline();
        });
        monthDiv.appendChild(el);
      });

      timelineBody.appendChild(monthDiv);
    });

    if (timelineSearchText) {
      timelineCount.textContent = totalResults + ' 条结果';
    } else {
      timelineCount.textContent = chunks.length + ' 天日记';
    }

    // Show toggle button
    if (chunks.length > 1) {
      timelineToggle.classList.add('visible');
    }
  }

  function toggleTimeline() {
    const isVisible = timelinePanel.classList.contains('visible');
    if (isVisible) {
      timelinePanel.classList.remove('visible');
      timelineOverlay.classList.remove('visible');
    } else {
      renderTimeline();
      timelinePanel.classList.add('visible');
      timelineOverlay.classList.add('visible');
      // Scroll to active item
      setTimeout(() => {
        const active = timelineBody.querySelector('.timeline-item.active');
        if (active) active.scrollIntoView({ block: 'center', behavior: 'smooth' });
      }, 450);
    }
  }

  timelineToggle.addEventListener('click', toggleTimeline);
  timelineClose.addEventListener('click', toggleTimeline);
  timelineOverlay.addEventListener('click', toggleTimeline);

  // ===== Timeline Search =====
  timelineSearchInput.addEventListener('input', e => {
    timelineSearchText = e.target.value.trim();
    timelineSearchClear.classList.toggle('visible', !!timelineSearchText);
    renderTimeline();
  });

  timelineSearchClear.addEventListener('click', () => {
    timelineSearchInput.value = '';
    timelineSearchText = '';
    timelineSearchClear.classList.remove('visible');
    renderTimeline();
    timelineSearchInput.focus();
  });

  // ===== Nav =====
  function updateNav() {
    btnPrev.disabled = currentPage === 0;
    btnNext.disabled = currentPage >= chunks.length - 1;
  }

  function flip(direction) {
    const cls = direction === 'next' ? 'flip-next' : 'flip-prev';
    pageWrapper.classList.add(cls);
    setTimeout(() => {
      pageWrapper.classList.remove(cls);
    }, 600);
  }

  btnPrev.addEventListener('click', () => {
    if (currentPage > 0) {
      currentPage--;
      flip('prev');
      renderPage();
      updateNav();
    }
  });

  btnNext.addEventListener('click', () => {
    if (currentPage < chunks.length - 1) {
      currentPage++;
      flip('next');
      renderPage();
      updateNav();
    }
  });

  // ===== Keyboard =====
  document.addEventListener('keydown', e => {
    if (timelinePanel.classList.contains('visible')) {
      if (e.key === 'Escape') {
        toggleTimeline();
      } else if (e.key === '/' && document.activeElement !== timelineSearchInput) {
        e.preventDefault();
        timelineSearchInput.focus();
      }
      return;
    }
    if (e.key === 'ArrowRight' || e.key === 'd') {
      btnNext.click();
    } else if (e.key === 'ArrowLeft' || e.key === 'a') {
      btnPrev.click();
    } else if (e.key === 't' || e.key === 'T') {
      e.preventDefault();
      toggleTimeline();
    }
  });

  // Touch swipe
  let touchStartX = 0;
  pageWrapper.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
  }, { passive: true });
  pageWrapper.addEventListener('touchend', e => {
    const diff = touchStartX - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 50) {
      if (diff > 0) btnNext.click();
      else btnPrev.click();
    }
  }, { passive: true });

  // ===== Bookmark =====
  function bookmarkKey() {
    return 'diary:' + currentPage;
  }

  function updateBookmark() {
    const key = bookmarkKey();
    bookmarkBtn.classList.toggle('active', !!bookmarks[key]);
    bookmarkBtn.textContent = bookmarks[key] ? '★' : '☆';
  }

  bookmarkBtn.addEventListener('click', () => {
    const key = bookmarkKey();
    if (bookmarks[key]) {
      delete bookmarks[key];
      toast('已取消收藏');
    } else {
      bookmarks[key] = Date.now();
      toast('已收藏本页 ★');
    }
    localStorage.setItem('diary_bookmarks', JSON.stringify(bookmarks));
    updateBookmark();
  });

  // ===== Init =====
  // Splash handles the entry — diary loads after splash is dismissed

})();
</script>
</body>
</html>
